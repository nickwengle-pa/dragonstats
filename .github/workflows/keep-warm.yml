name: Keep Supabase Awake

# Why this exists:
# Supabase free-tier projects auto-pause after 7 days with no activity. This job
# makes a tiny, real database read every 2 days, which resets that inactivity
# timer so the project never falls asleep. Runs entirely on GitHub's servers —
# no local machine required.
#
# About the key below: it is the PUBLIC anon key — the exact same key that ships
# inside the app's browser bundle and is meant to be public. It is NOT a secret
# and grants no special access (row-level security still applies).

on:
  schedule:
    - cron: "0 6 */2 * *"   # every 2 days at 06:00 UTC (well inside the 7-day window)
  workflow_dispatch: {}       # also runnable on-demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          SUPABASE_URL="https://nlmrjmvsamcyhpluaxlh.supabase.co"
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbXJqbXZzYW1jeWhwbHVheGxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjE0NjYsImV4cCI6MjA4OTc5NzQ2Nn0.g5pQKmKV1e1kroeTZp9tI08F3JYcvXjd4vSg-HFjuAM"
          echo "Pinging Supabase to keep the project awake..."
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            "$SUPABASE_URL/rest/v1/programs?select=id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Supabase ping failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Supabase is awake ✔"
