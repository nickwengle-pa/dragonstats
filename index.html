<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Dragon Stats — High School Football Play-by-Play & Statistics" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <title>Dragon Stats</title>
  </head>
  <body class="bg-surface-bg text-white antialiased">
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:20px;font-family:Inter,system-ui,sans-serif">
        <div style="font-size:2rem;font-weight:900;letter-spacing:-0.5px;color:#fff">DRAGON STATS</div>
        <div style="width:40px;height:40px;border:3px solid #333;border-top-color:#ef4444;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <div style="font-size:0.75rem;color:#666;font-weight:600">Loading...</div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
