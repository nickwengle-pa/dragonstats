<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Dragon Stats — High School Football Play-by-Play & Statistics" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <title>Dragon Stats</title>
  </head>
  <body class="bg-surface-bg text-white antialiased">
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:24px;font-family:Inter,system-ui,sans-serif;background:#0a0a0a">
        <!-- Team logo placeholder — replaced by React once loaded -->
        <div id="splash-logo" style="width:100px;height:100px;display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 100 100" width="100" height="100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="#333" stroke-width="2" fill="#161616"/>
            <text x="50" y="62" text-anchor="middle" font-size="38" font-weight="900" fill="#ef4444" font-family="'Impact','Arial Black','Haettenschweiler',sans-serif" font-style="italic" letter-spacing="2">PL</text>
          </svg>
        </div>
        <!-- Bouncing football -->
        <div style="position:relative;width:120px;height:28px">
          <div style="position:absolute;top:0;left:0;animation:bounce-fb 1.4s ease-in-out infinite">
            <svg viewBox="0 0 40 24" width="36" height="22" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="20" cy="12" rx="18" ry="10" fill="#8B4513" stroke="#5C2E00" stroke-width="1.5"/>
              <path d="M20 2 L20 22" stroke="#fff" stroke-width="1" opacity="0.6"/>
              <path d="M12 5 Q20 8 28 5" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.5"/>
              <path d="M12 19 Q20 16 28 19" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.5"/>
              <path d="M14 8 L14 16 M17 7 L17 17 M20 6 L20 18 M23 7 L23 17 M26 8 L26 16" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
            </svg>
          </div>
        </div>
        <!-- App name -->
        <div style="font-size:1.75rem;font-weight:900;letter-spacing:-0.5px;color:#e5e5e5">DRAGON STATS</div>
        <!-- Loading text -->
        <div style="font-size:0.7rem;color:#999;font-weight:600;letter-spacing:1px">LOADING</div>
      </div>
      <style>
        @keyframes bounce-fb {
          0%   { transform: translateX(0px) rotate(0deg); }
          25%  { transform: translateX(80px) rotate(15deg) translateY(-4px); }
          50%  { transform: translateX(80px) rotate(0deg); }
          75%  { transform: translateX(0px) rotate(-15deg) translateY(-4px); }
          100% { transform: translateX(0px) rotate(0deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
