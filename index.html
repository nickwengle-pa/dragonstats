<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#070a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Dragon Stats — High School Football Play-by-Play & Statistics" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <title>Dragon Stats</title>
  </head>
  <body class="bg-surface-bg text-white antialiased">
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:20px;font-family:'Barlow Condensed',sans-serif;background:#070a0f">
        <!-- Splash logo -->
        <div style="position:relative">
          <div style="width:88px;height:88px;border-radius:20px;background:linear-gradient(135deg,#dc2626,#991b1b);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(220,38,38,0.3)">
            <span style="font-size:36px;font-weight:900;color:white;letter-spacing:2px;font-style:italic">DS</span>
          </div>
        </div>
        <!-- App name -->
        <div>
          <div style="font-size:2rem;font-weight:800;letter-spacing:3px;color:#fff;text-transform:uppercase;text-align:center">DRAGON STATS</div>
          <div style="font-size:0.65rem;font-weight:600;letter-spacing:4px;color:#555;text-align:center;margin-top:4px;font-family:'Barlow',sans-serif;text-transform:uppercase">Football Intelligence</div>
        </div>
        <!-- Loading bar -->
        <div style="width:120px;height:3px;background:#1a1d24;border-radius:4px;overflow:hidden;margin-top:8px">
          <div style="width:40%;height:100%;background:linear-gradient(90deg,#dc2626,#f59e0b);border-radius:4px;animation:load-bar 1.5s ease-in-out infinite"></div>
        </div>
      </div>
      <style>
        @keyframes load-bar {
          0%   { width: 10%; margin-left: 0; }
          50%  { width: 50%; margin-left: 25%; }
          100% { width: 10%; margin-left: 90%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
